<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auralis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Heebo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="auralis.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (local copies so the app runs offline after first launch) -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/babel.min.js"></script>

  <!-- Eel bridge (served by the Python eel server) -->
  <script src="/eel.js"></script>

  <!-- Design components — JSX is transformed in-browser by Babel.
       Order matters: shell defines AuFrame/AuTopbar/Ico that the others use. -->
  <script type="text/babel" data-presets="react" src="auralis-shell.jsx"></script>
  <script type="text/babel" data-presets="react" src="auralis-live.jsx"></script>
  <script type="text/babel" data-presets="react" src="auralis-library.jsx"></script>
  <script type="text/babel" data-presets="react" src="auralis-settings.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
